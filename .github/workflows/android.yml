name: Build Unbound APK

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" > /dev/null

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Restore stable signing keystore
        if: ${{ env.KS != '' }}
        env:
          KS: ${{ secrets.DEBUG_KEYSTORE_B64 }}
        run: echo "$KS" | base64 -d > app/unbound-debug.keystore

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: unbound-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish latest release (permanent download URL)
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Unbound — build ${{ github.run_number }}
          body: |
            **build ${{ github.run_number }}** · commit ${{ github.sha }}
            Auto-built from the newest push to `${{ github.ref_name }}`.
            This same label shows at the bottom of the widget settings screen.

            Permanent link: releases/latest/download/app-debug.apk
          files: app/build/outputs/apk/debug/app-debug.apk
