name: Build Unbound APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: yes | sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" > /dev/null

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Read version from build.gradle
        id: version
        run: |
          VC=$(grep -oP 'versionCode\s+\K\d+' app/build.gradle)
          VN=$(grep -oP "versionName\s+'\K[^']+" app/build.gradle)
          echo "code=$VC" >> "$GITHUB_OUTPUT"
          echo "name=$VN" >> "$GITHUB_OUTPUT"

      - name: Rename APK for release
        run: cp app/build/outputs/apk/debug/app-debug.apk "unbound-v${{ steps.version.outputs.name }}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: unbound-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.code }}
          name: Unbound v${{ steps.version.outputs.name }}
          files: unbound-v${{ steps.version.outputs.name }}.apk
          fail_on_unmatched_files: true
          make_latest: true
